resolver 127.0.0.11 valid=30s ipv6=off;

# ===== БЭК =====
server {
    listen 80;
    server_name api.fast-day.ru;

    location / {
	    set $backend_url "http://backend:8080";
	    proxy_pass $backend_url;        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ===== CRM =====
server {
    listen 80;
    server_name my.fast-day.ru;

    location / {
	    set $crm_url "http://crm:80";
	    proxy_pass $crm_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ===== APP =====
server {
    listen 80;
    server_name app.fast-day.ru;

    location / {
	    set $booking_url "http://booking:3001";        
	    proxy_pass $booking_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# LANDING
server {
    listen 80;
    server_name fast-day.ru;

    location / {
        set $landing_url "http://landing:5000";
        proxy_pass $landing_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# =====  MINIO =====
server {
    listen 80;
    server_name storage.fast-day.ru;

    location / {
        set $minio_url "http://minio:9000";
        proxy_pass $minio_url;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        proxy_request_buffering off;
    }
}

server {
    listen 80;
    server_name console.storage.fast-day.ru;

    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    location / {
        set $minio_console_url "http://minio:9001";
        proxy_pass $minio_console_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ===== SWAGGER =====
server {
    listen 80;
    server_name docs.api.fast-day.ru;

    location / {
        set $backend_url "http://backend:8080";
        proxy_pass $backend_url/docs;  # ← редиректим на /docs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}